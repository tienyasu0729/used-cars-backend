spring:
  flyway:
    enabled: false
  datasource:
    url: jdbc:h2:mem:usedcars_test;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=YEAR
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

app:
  jwt:
    secret: testTestTestTestTestTestTestTestTestSecretKey32Chars!!
    expiration-ms: 3600000
  payment:
    frontend-base-url: http://localhost:5173
    vnpay:
      tmn-code: TESTTMN01
      hash-secret: test-vnpay-hash-secret-32chars-minimum-length
      pay-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
      return-url: http://localhost:8080/api/v1/payment/vnpay/return
      ipn-url: http://localhost:8080/api/v1/payment/vnpay/ipn
    zalopay:
      app-id: "2553"
      key1: testZaloKey1ForIntegrationTestsOnly
      key2: testZaloKey2ForIntegrationTestsOnly
      endpoint: https://sb-openapi.zalopay.vn/v2/create
      callback-url: http://localhost:8080/api/v1/payment/zalopay/callback
